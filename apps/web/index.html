<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="https://res.cloudinary.com/dgbreoalg/image/upload/q_auto/f_auto/v1746566762/growth_ggcqxd.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easivent - Inventory Management</title>
    <script>
      ;(function () {
        const theme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark").matches
            ? "dark"
            : "light")
        if (theme === "dark") {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
